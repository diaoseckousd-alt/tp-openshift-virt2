apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-pfsense
  namespace: seckou-dev
  labels:
    app: vm1-pfsense
    role: firewall-gateway
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm1-pfsense
        role: firewall-gateway
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        resources:
          limits:
            memory: 2Gi
        devices:
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: nic-lan
              masquerade: {}
              model: virtio
            - name: nic-dmz
              bridge: {} 
              model: virtio
            - name: nic-wan
              bridge: {}
              model: virtio
      networks:
        - name: nic-lan
          pod: {}
        - name: nic-dmz
          multus:
            networkName: dmz-network
        - name: nic-wan
          multus:
            networkName: wan-network
      volumes:
        - dataVolume:
            name: vm1-pfsense-disk
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm1-pfsense
              chpasswd: { expire: false }
              password: Pfsense123!
              user: fedora
              runcmd:
                - dnf install -y iptables iptables-services
                - systemctl enable --now iptables
                - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
                - sysctl -p
                - nmcli con add type ethernet con-name dmz ifname eth1 ipv4.method manual ipv4.addresses 192.168.10.1/24
                - nmcli con add type ethernet con-name wan ifname eth2 ipv4.method dhcp
                - iptables -t nat -A POSTROUTING -o eth2 -j MASQUERADE
                - service iptables save
          name: cloudinitdisk
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm1-pfsense-disk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi