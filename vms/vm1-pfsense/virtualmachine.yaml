apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-pfsense
  namespace: seckou-dev
  labels:
    app: vm1-pfsense
    role: firewall-gateway
    vm.kubevirt.io/template: fedora-server-small
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm1-pfsense
        role: firewall-gateway
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        resources:
          limits:
            memory: 2Gi
        devices:
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            # eth0: LAN (Réseau Pod interne par défaut)
            - name: nic-lan
              masquerade: {}
              model: virtio
            # eth1: DMZ
            - name: nic-dmz
              bridge: {} 
              model: virtio
            # eth2: WAN
            - name: nic-wan
              bridge: {}
              model: virtio
          networkInterfaceMultiqueue: true
          rng: {}
      networks:
        - name: nic-lan
          pod: {}
        - name: nic-dmz
          multus:
            networkName: dmz-network
        - name: nic-wan
          multus:
            networkName: wan-network
      volumes:
        - dataVolume:
            name: vm1-pfsense-disk
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm1-pfsense
              chpasswd:
                expire: false
                password: Pfsense123!
              user: fedora
              runcmd:
                - dnf install -y iptables iptables-services
                - systemctl enable --now iptables
                # Activation du Forwarding IP
                - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
                - sysctl -p
                # Configuration réseau via NetworkManager (nmcli)
                # eth0 est géré par DHCP (OpenShift Pod Network)
                # eth1 (DMZ) - IP Statique exemple
                - nmcli con add type ethernet con-name dmz ifname eth1 ipv4.method manual ipv4.addresses 192.168.10.1/24
                # eth2 (WAN) - DHCP (ou IP publique)
                - nmcli con add type ethernet con-name wan ifname eth2 ipv4.method dhcp
                # NAT : On masque tout ce qui sort vers Internet via le WAN (eth2)
                - iptables -t nat -A POSTROUTING -o eth2 -j MASQUERADE
                - service iptables save
              final_message: "Gateway Fedora avec 3 interfaces (LAN, DMZ, WAN) prête."
          name: cloudinitdisk
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm1-pfsense-disk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi