apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-pfsense
  namespace: seckou-dev
  labels:
    app: vm1-pfsense
    role: firewall-gateway
    vm.kubevirt.io/template: fedora-server-small
    vm.kubevirt.io/template.namespace: openshift
spec:
  runStrategy: Always
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: fedora
        vm.kubevirt.io/workload: server
      labels:
        kubevirt.io/domain: vm1-pfsense
        kubevirt.io/size: small
        network.kubevirt.io/headlessService: headless
        role: firewall-gateway
    spec:
      architecture: amd64
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          networkInterfaceMultiqueue: true
          rng: {}
        features:
          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
        machine:
          type: pc-q35-rhel9.2.0
        memory:
          guest: 2Gi
        resources:
          limits:
            memory: 2Gi
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      tolerations:
        - effect: NoSchedule
          key: sandbox-cnv
          operator: Exists
      volumes:
        - dataVolume:
            name: vm1-pfsense-disk
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm1-pfsense
              chpasswd:
                expire: false
              password: Pfsense123!
              user: fedora
              # Installation iptables comme firewall/gateway
              runcmd:
                - dnf install -y iptables iptables-services nftables
                - systemctl enable iptables
                - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
                - sysctl -p
                # Règles NAT/firewall de base
                - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
                - iptables -A FORWARD -i eth0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT
                - iptables -A FORWARD -j ACCEPT
                - service iptables save
                - systemctl start iptables
              final_message: "VM1 Firewall/Gateway opérationnel!"
          name: cloudinitdisk
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm1-pfsense-disk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
