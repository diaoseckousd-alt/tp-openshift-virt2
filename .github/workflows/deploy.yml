name: Deploy Infrastructure Hybride OpenShift

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NAMESPACE: seckou-dev

jobs:
  deploy:
    name: Déploiement sur OpenShift
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 🔧 Installation CLI OpenShift
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: 🔐 Connexion au cluster OpenShift
        run: |
          oc login \
            --token=${{ secrets.OC_TOKEN }} \
            --server=${{ secrets.OC_SERVER }} \
            --insecure-skip-tls-verify=true
          echo "✅ Connecté : $(oc whoami)"
          oc project ${{ env.NAMESPACE }}

      - name: 🔒 Déploiement NetworkPolicies
        run: |
          oc apply -f network/networkpolicy.yaml -n ${{ env.NAMESPACE }}
          echo "✅ NetworkPolicies appliquées"
          oc get networkpolicy -n ${{ env.NAMESPACE }}

      - name: 🖥️ Déploiement VM1 pfSense (VirtualMachine)
        run: |
          oc apply -f vms/vm1-pfsense/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM1 pfSense créée"
          oc get vm vm1-pfsense -n ${{ env.NAMESPACE }}

      - name: 🗄️ Déploiement VM2 MySQL (VirtualMachine)
        run: |
          oc apply -f vms/vm2-mysql/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM2 MySQL créée"
          oc get vm vm2-mysql -n ${{ env.NAMESPACE }}

      - name: 🌍 Déploiement Nginx + Node.js (Conteneur)
        run: |
          oc apply -f conteneur/nginx/ -n ${{ env.NAMESPACE }}
          echo "✅ Conteneur Nginx déployé"
          oc get pods -l app=nginx-web -n ${{ env.NAMESPACE }}

      - name: 📋 Résumé final
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║        TP OpenShift - Architecture Hybride               ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo ""
          echo "=== 🖥️  VMs OpenShift Virtualization ==="
          oc get vm -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== 🐳 Conteneurs ==="
          oc get pods -l app=nginx-web -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== 🌐 Route publique ==="
          oc get route nginx-web-route -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== 🔒 NetworkPolicies ==="
          oc get networkpolicy -n ${{ env.NAMESPACE }}
          echo ""
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  VM1  pfSense  → VirtualMachine Fedora (Firewall)       ║"
          echo "║  VM2  MySQL    → VirtualMachine Fedora (Base de données) ║"
          echo "║  Nginx+Node.js → Conteneur OpenShift (Serveur Web)      ║"
          echo "╚══════════════════════════════════════════════════════════╝"
